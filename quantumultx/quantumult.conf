# Quantumult X自用配置
[general]
network_check_url=https://www.baidu.com/
server_check_url=https://www.gstatic.com/generate_204
server_check_timeout=3000
# > 下列路径将不经过QuanX的处理
excluded_routes=192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8
profile_img_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/img/policy/proxy.png# > 功能强大的解析器，用于引用资源的转换
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
; ip-api 免费接口不支持 HTTPS。需要节点地理信息展示时可手动启用下一行，但会使用明文 HTTP 查询。
geo_location_checker=disabled
;geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
; 下面的域名列表将绕过 DNS 解析，直接使用系统默认解析；可避免部分国内软件被误判为国外地址而走代理。
dns_exclusion_list=*.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com
; 如需增强 rewrite 命中率，可手动启用下一行；可能影响淘宝、QQ、视频或实时通信。
;udp_drop_list=443, STUN, QUIC

[dns]
;prefer-doh3
;doh-server = https://223.5.5.5/dns-query, https://223.6.6.6/dns-query
;指定的 dns服务器
no-system
no-ipv6
server=202.141.176.93
server=202.141.178.13
server=117.50.10.10
server=223.5.5.5
server=119.29.29.29:53
server=119.28.28.28
server=114.114.114.114
server=/*.icloud.com/119.29.29.29
server=/*.icloud.com.cn/119.29.29.29
server=/*.tencent.com/119.29.29.29
server=/*.weixin.com/119.29.29.29

